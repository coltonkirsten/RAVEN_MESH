# RAVEN Mesh — full_demo manifest.
# Wires all four real nodes plus a dummy actor to demonstrate end-to-end flows:
#   dummy_actor -> approval_node.inbox -> (approve) -> cron_node.set
#   cron_node fires -> webui_node.show_message / webui_node.change_color
#   human_node can poke at webui_node, cron_node, or invoke approval_node.inbox

nodes:
  - id: dummy_actor
    kind: actor
    runtime: local-process
    identity_secret: env:DUMMY_ACTOR_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/generic_inbox.json

  - id: approval_node
    kind: approval
    runtime: local-process
    identity_secret: env:APPROVAL_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: request_response
        schema: ../schemas/approval_request.json
      - name: ui_visibility
        type: tool
        invocation_mode: request_response
        schema: ../schemas/ui_visibility.json

  - id: cron_node
    kind: hybrid
    runtime: local-process
    identity_secret: env:CRON_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: set
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_set.json
      - name: delete
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_delete.json
      - name: list
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_list.json

  - id: webui_node
    kind: capability
    runtime: local-process
    identity_secret: env:WEBUI_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: show_message
        type: tool
        invocation_mode: request_response
        schema: ../schemas/webui_show_message.json
      - name: change_color
        type: tool
        invocation_mode: request_response
        schema: ../schemas/webui_change_color.json
      - name: ui_visibility
        type: tool
        invocation_mode: request_response
        schema: ../schemas/ui_visibility.json

  - id: human_node
    kind: actor
    runtime: local-process
    identity_secret: env:HUMAN_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/generic_inbox.json
      - name: ui_visibility
        type: tool
        invocation_mode: request_response
        schema: ../schemas/ui_visibility.json

  - id: kanban_node
    kind: capability
    runtime: local-process
    identity_secret: env:KANBAN_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: create_card
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_create_card.json
      - name: move_card
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_move_card.json
      - name: update_card
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_update_card.json
      - name: delete_card
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_delete_card.json
      - name: list_cards
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_list_cards.json
      - name: get_board
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_get_board.json
      - name: add_column
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_add_column.json
      - name: delete_column
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_delete_column.json
      - name: ui_visibility
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_ui_visibility.json
      - name: status_get
        type: tool
        invocation_mode: request_response
        schema: ../schemas/kanban_status_get.json

relationships:
  # dummy_actor goes through approval to reach anything.
  - { from: dummy_actor, to: approval_node.inbox }

  # approval_node can forward to cron and webui.
  - { from: approval_node, to: cron_node.set }
  - { from: approval_node, to: cron_node.delete }
  - { from: approval_node, to: cron_node.list }
  - { from: approval_node, to: webui_node.show_message }
  - { from: approval_node, to: webui_node.change_color }

  # cron fires invocations into webui.
  - { from: cron_node, to: webui_node.show_message }
  - { from: cron_node, to: webui_node.change_color }

  # human_node can poke at all the capabilities directly, plus the human inbox.
  - { from: human_node, to: webui_node.show_message }
  - { from: human_node, to: webui_node.change_color }
  - { from: human_node, to: cron_node.set }
  - { from: human_node, to: cron_node.delete }
  - { from: human_node, to: cron_node.list }
  - { from: human_node, to: approval_node.inbox }
  - { from: human_node, to: human_node.inbox }

  # ui_visibility cross-edges: approval_node and human_node both invoke
  # ui_visibility on each other and on webui_node.
  - { from: approval_node, to: webui_node.ui_visibility }
  - { from: approval_node, to: human_node.ui_visibility }
  - { from: human_node, to: webui_node.ui_visibility }
  - { from: human_node, to: approval_node.ui_visibility }

  # kanban_node — approval gates writes, human + cron + nexus drive directly.
  - { from: approval_node, to: kanban_node.create_card }
  - { from: approval_node, to: kanban_node.move_card }
  - { from: approval_node, to: kanban_node.update_card }
  - { from: approval_node, to: kanban_node.delete_card }

  - { from: human_node, to: kanban_node.create_card }
  - { from: human_node, to: kanban_node.move_card }
  - { from: human_node, to: kanban_node.update_card }
  - { from: human_node, to: kanban_node.delete_card }
  - { from: human_node, to: kanban_node.list_cards }
  - { from: human_node, to: kanban_node.get_board }
  - { from: human_node, to: kanban_node.add_column }
  - { from: human_node, to: kanban_node.delete_column }
  - { from: human_node, to: kanban_node.ui_visibility }
  - { from: human_node, to: kanban_node.status_get }

  - { from: cron_node, to: kanban_node.create_card }

  - { from: nexus_agent, to: kanban_node.create_card }
  - { from: nexus_agent, to: kanban_node.move_card }
  - { from: nexus_agent, to: kanban_node.update_card }
  - { from: nexus_agent, to: kanban_node.delete_card }
  - { from: nexus_agent, to: kanban_node.list_cards }
  - { from: nexus_agent, to: kanban_node.get_board }
  - { from: nexus_agent, to: kanban_node.add_column }
  - { from: nexus_agent, to: kanban_node.delete_column }
  - { from: nexus_agent, to: kanban_node.ui_visibility }
  - { from: nexus_agent, to: kanban_node.status_get }
