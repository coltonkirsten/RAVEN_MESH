# RAVEN Mesh — nexus_agent_isolated_demo manifest.
#
# Same shape as nexus_agent_demo.yaml but the agent runs INSIDE a Docker
# container. The host process drives docker; the agent is fully isolated
# from the host filesystem (empty /workspace) and has no view of host code.
# Auth is passed in via the macOS keychain OAuth token.

nodes:
  - id: nexus_agent_isolated
    kind: actor
    runtime: local-process
    identity_secret: env:NEXUS_AGENT_ISOLATED_SECRET
    metadata:
      location_hint: mac-mini
      description: Claude-Code-driven autonomous agent running in a Docker container.
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/generic_inbox.json
      - name: status
        type: tool
        invocation_mode: request_response
        schema: ../schemas/nexus_agent_status.json
      - name: ui_visibility
        type: tool
        invocation_mode: request_response
        schema: ../schemas/ui_visibility.json

  - id: approval_node
    kind: approval
    runtime: local-process
    identity_secret: env:APPROVAL_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: request_response
        schema: ../schemas/approval_request.json

  - id: cron_node
    kind: hybrid
    runtime: local-process
    identity_secret: env:CRON_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: set
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_set.json
      - name: delete
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_delete.json
      - name: list
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_list.json

  - id: webui_node
    kind: capability
    runtime: local-process
    identity_secret: env:WEBUI_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: show_message
        type: tool
        invocation_mode: request_response
        schema: ../schemas/webui_show_message.json
      - name: change_color
        type: tool
        invocation_mode: request_response
        schema: ../schemas/webui_change_color.json

  - id: human_node
    kind: actor
    runtime: local-process
    identity_secret: env:HUMAN_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/generic_inbox.json

relationships:
  # Agent can reach every capability and other actors directly.
  - { from: nexus_agent_isolated, to: webui_node.show_message }
  - { from: nexus_agent_isolated, to: webui_node.change_color }
  - { from: nexus_agent_isolated, to: cron_node.set }
  - { from: nexus_agent_isolated, to: cron_node.delete }
  - { from: nexus_agent_isolated, to: cron_node.list }
  - { from: nexus_agent_isolated, to: approval_node.inbox }
  - { from: nexus_agent_isolated, to: human_node.inbox }
  # Agent can talk to itself (write to its own inbox to chain work).
  - { from: nexus_agent_isolated, to: nexus_agent_isolated.inbox }

  # Humans can poke the agent and check status.
  - { from: human_node, to: nexus_agent_isolated.inbox }
  - { from: human_node, to: nexus_agent_isolated.status }
  - { from: human_node, to: nexus_agent_isolated.ui_visibility }
  - { from: human_node, to: webui_node.show_message }
  - { from: human_node, to: webui_node.change_color }
  - { from: human_node, to: cron_node.set }
  - { from: human_node, to: cron_node.delete }
  - { from: human_node, to: cron_node.list }
  - { from: human_node, to: approval_node.inbox }
  - { from: human_node, to: human_node.inbox }

  # Approval node can forward to capabilities (when the agent goes through it).
  - { from: approval_node, to: cron_node.set }
  - { from: approval_node, to: cron_node.delete }
  - { from: approval_node, to: cron_node.list }
  - { from: approval_node, to: webui_node.show_message }
  - { from: approval_node, to: webui_node.change_color }
  - { from: approval_node, to: nexus_agent_isolated.inbox }

  # Cron fires invocations into webui (preserved from full_demo).
  - { from: cron_node, to: webui_node.show_message }
  - { from: cron_node, to: webui_node.change_color }
