# RAVEN Mesh — nexus_agent_demo manifest.
#
# Demonstrates an ACTOR node that runs Claude Code (the `claude` CLI) as its
# agent harness. The agent:
#   - Receives messages on its inbox surface.
#   - Spawns claude per message with our MCP bridge in --mcp-config.
#   - Uses mesh_invoke / mesh_send_to_inbox to call other nodes' surfaces.
#
# Wires the nexus_agent alongside the existing real demo nodes so the agent
# has something to act on. The kanban_node is OPTIONAL — if it's registered
# with Core (because worker C added it to a different manifest, or because
# you copy this manifest and add the node block), the relationships below
# under the "kanban (optional)" comment will activate.

nodes:
  - id: nexus_agent
    kind: actor
    runtime: local-process
    identity_secret: env:NEXUS_AGENT_SECRET
    metadata:
      location_hint: mac-mini
      description: Claude-Code-driven autonomous agent.
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/generic_inbox.json
      - name: status
        type: tool
        invocation_mode: request_response
        schema: ../schemas/nexus_agent_status.json
      - name: ui_visibility
        type: tool
        invocation_mode: request_response
        schema: ../schemas/ui_visibility.json

  - id: approval_node
    kind: approval
    runtime: local-process
    identity_secret: env:APPROVAL_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: request_response
        schema: ../schemas/approval_request.json

  - id: cron_node
    kind: hybrid
    runtime: local-process
    identity_secret: env:CRON_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: set
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_set.json
      - name: delete
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_delete.json
      - name: list
        type: tool
        invocation_mode: request_response
        schema: ../schemas/cron_list.json

  - id: webui_node
    kind: capability
    runtime: local-process
    identity_secret: env:WEBUI_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: show_message
        type: tool
        invocation_mode: request_response
        schema: ../schemas/webui_show_message.json
      - name: change_color
        type: tool
        invocation_mode: request_response
        schema: ../schemas/webui_change_color.json

  - id: human_node
    kind: actor
    runtime: local-process
    identity_secret: env:HUMAN_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/generic_inbox.json

relationships:
  # Agent can reach every capability and other actors directly.
  - { from: nexus_agent, to: webui_node.show_message }
  - { from: nexus_agent, to: webui_node.change_color }
  - { from: nexus_agent, to: cron_node.set }
  - { from: nexus_agent, to: cron_node.delete }
  - { from: nexus_agent, to: cron_node.list }
  - { from: nexus_agent, to: approval_node.inbox }
  - { from: nexus_agent, to: human_node.inbox }
  # Agent can talk to itself (write to its own inbox to chain work).
  - { from: nexus_agent, to: nexus_agent.inbox }

  # Humans can poke the agent and check status.
  - { from: human_node, to: nexus_agent.inbox }
  - { from: human_node, to: nexus_agent.status }
  - { from: human_node, to: nexus_agent.ui_visibility }
  - { from: human_node, to: webui_node.show_message }
  - { from: human_node, to: webui_node.change_color }
  - { from: human_node, to: cron_node.set }
  - { from: human_node, to: cron_node.delete }
  - { from: human_node, to: cron_node.list }
  - { from: human_node, to: approval_node.inbox }
  - { from: human_node, to: human_node.inbox }

  # Approval node can forward to capabilities (when the agent goes through it).
  - { from: approval_node, to: cron_node.set }
  - { from: approval_node, to: cron_node.delete }
  - { from: approval_node, to: cron_node.list }
  - { from: approval_node, to: webui_node.show_message }
  - { from: approval_node, to: webui_node.change_color }
  - { from: approval_node, to: nexus_agent.inbox }

  # Cron fires invocations into webui (preserved from full_demo).
  - { from: cron_node, to: webui_node.show_message }
  - { from: cron_node, to: webui_node.change_color }
