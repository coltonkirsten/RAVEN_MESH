nodes:
  - id: bench_client
    kind: actor
    runtime: local-process
    identity_secret: env:BENCH_CLIENT_SECRET
    metadata:
      role: bench-driver
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/echo.json

  - id: bench_echo
    kind: capability
    runtime: local-process
    identity_secret: env:BENCH_ECHO_SECRET
    metadata:
      role: trivial-echo
    surfaces:
      - name: ping
        type: tool
        invocation_mode: request_response
        schema: ../schemas/echo.json
      - name: pong
        type: tool
        invocation_mode: request_response
        schema: ../schemas/echo.json
      - name: ff
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/echo.json

relationships:
  - from: bench_client
    to: bench_echo.ping
  - from: bench_client
    to: bench_echo.pong
  - from: bench_client
    to: bench_echo.ff
