# RAVEN_MESH — provenance replay demo manifest.
#
# replay_node taps Core's envelope stream, captures every routed envelope,
# and exposes mesh surfaces to list / inspect / re-fire chains by
# correlation_id. counter_node is a tiny stateful target whose only job is
# to make replay observable: replaying the same chain after a reset must
# drive the counter to the same final value as the original run.
#
# Layer: opinionated. Nothing here changes the protocol — replay_node only
# uses primitives Core already exposes (admin/stream + admin/invoke + signed
# envelopes + correlation_id). v1's HR-15 pulls those into normal mesh
# surfaces and replay_node loses its admin-token dependency.
nodes:
  - id: replay_node
    kind: capability
    runtime: local-process
    identity_secret: env:REPLAY_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: list
        type: tool
        invocation_mode: request_response
        schema: ../schemas/replay_list.json
      - name: chain
        type: tool
        invocation_mode: request_response
        schema: ../schemas/replay_chain.json
      - name: run
        type: tool
        invocation_mode: request_response
        schema: ../schemas/replay_run.json
      - name: diff
        type: tool
        invocation_mode: request_response
        schema: ../schemas/replay_diff.json

  - id: counter_node
    kind: capability
    runtime: local-process
    identity_secret: env:COUNTER_NODE_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: increment
        type: tool
        invocation_mode: request_response
        schema: ../schemas/counter_increment.json
      - name: get
        type: tool
        invocation_mode: request_response
        schema: ../schemas/counter_get.json
      - name: reset
        type: tool
        invocation_mode: request_response
        schema: ../schemas/counter_reset.json

  - id: demo_actor
    kind: actor
    runtime: local-process
    identity_secret: env:DEMO_ACTOR_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/demo_actor_inbox.json

relationships:
  - { from: demo_actor, to: counter_node.increment }
  - { from: demo_actor, to: counter_node.get }
  - { from: demo_actor, to: counter_node.reset }
  - { from: demo_actor, to: replay_node.list }
  - { from: demo_actor, to: replay_node.chain }
  - { from: demo_actor, to: replay_node.run }
  - { from: demo_actor, to: replay_node.diff }
