# NATS-pivot manifest. Same shape as RAVEN Mesh manifest, but the routing
# semantics are realised by NATS subjects + per-user permissions instead of
# in-process edge enforcement.

nodes:
  - id: echo
    kind: capability
    surfaces:
      - name: ping
        type: tool
        invocation_mode: request_response
        schema: schemas/echo.json

  - id: kanban
    kind: capability
    surfaces:
      - name: create
        type: tool
        invocation_mode: request_response
        schema: schemas/kanban_create.json
      - name: list
        type: tool
        invocation_mode: request_response
        schema: schemas/kanban_list.json

  - id: dashboard
    kind: actor
    # Pure caller, no surfaces.
    surfaces: []

relationships:
  - from: dashboard
    to: echo.ping
  - from: dashboard
    to: kanban.create
  - from: dashboard
    to: kanban.list
