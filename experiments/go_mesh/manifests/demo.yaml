# RAVEN Mesh — protocol-validation demo manifest.
# Wires the three nodes from PRD §7: voice_actor (actor), tasks (capability),
# human_approval (approval). Used by tests/test_protocol.py and scripts/run_demo.sh.

nodes:
  - id: voice_actor
    kind: actor
    runtime: local-process
    identity_secret: env:VOICE_SECRET
    metadata:
      location_hint: macbook
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: fire_and_forget
        schema: ../schemas/voice_inbox.json

  - id: tasks
    kind: capability
    runtime: local-process
    identity_secret: env:TASKS_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: create
        type: tool
        invocation_mode: request_response
        schema: ../schemas/task_create.json
      - name: list
        type: tool
        invocation_mode: request_response
        schema: ../schemas/task_list.json

  - id: human_approval
    kind: approval
    runtime: local-process
    identity_secret: env:HUMAN_APPROVAL_SECRET
    metadata:
      location_hint: mac-mini
    surfaces:
      - name: inbox
        type: inbox
        invocation_mode: request_response
        schema: ../schemas/approval_request.json

  # Stand-in for "node implemented in any language". Tests exercise this
  # surface using only stdlib HTTP + manual HMAC signing — no SDK.
  - id: external_node
    kind: capability
    runtime: external-http
    identity_secret: env:EXTERNAL_NODE_SECRET
    metadata:
      location_hint: anywhere
      language: any
    surfaces:
      - name: ping
        type: tool
        invocation_mode: request_response
        schema: ../schemas/echo.json

relationships:
  - from: voice_actor
    to: tasks.list

  - from: voice_actor
    to: human_approval.inbox

  - from: human_approval
    to: tasks.create

  - from: voice_actor
    to: external_node.ping
