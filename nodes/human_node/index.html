<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RAVEN Mesh — human_node</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; padding: 1.5rem 2rem; background: #f4f5f7; color: #1f2933; }
  h1 { font-size: 1.4rem; margin: 0 0 1rem 0; }
  h2 { font-size: 1.05rem; margin: 1.5rem 0 0.6rem 0; }
  .row { display: grid; grid-template-columns: minmax(320px, 1fr) 2fr; gap: 1.5rem; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
          padding: 1rem 1.2rem; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  label { display: block; font-size: 0.85rem; color: #4b5563; margin-bottom: 0.2rem; }
  select, textarea, input { font: inherit; width: 100%; box-sizing: border-box;
          padding: 0.45rem 0.6rem; border: 1px solid #d1d5db; border-radius: 6px;
          background: #fff; }
  textarea { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
             min-height: 100px; }
  button { font: inherit; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
           border: 1px solid #1f2933; background: #1f2933; color: #fff; margin-top: 0.6rem; }
  button.ghost { background: #fff; color: #1f2933; border: 1px solid #d1d5db; }
  button:disabled { opacity: 0.6; cursor: progress; }
  .msg { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px;
         padding: 0.5rem 0.7rem; margin-bottom: 0.4rem; font-size: 0.9rem; }
  .msg .from { font-weight: 600; }
  .msg .ts { color: #6b7280; font-size: 0.75rem; margin-left: 0.4rem; }
  pre { background: #0f172a; color: #cbd5e1; padding: 0.5rem; border-radius: 6px;
        font-size: 0.78rem; overflow: auto; max-height: 220px; margin: 0.4rem 0 0 0; }
  .empty { color: #6b7280; font-style: italic; }
  #result { margin-top: 0.8rem; font-size: 0.85rem; }
  #result pre { max-height: 300px; }
  .form-field { margin: 0.5rem 0; }
  .form-field .desc { font-size: 0.75rem; color: #6b7280; margin-top: 0.15rem; }
  .form-field .required { color: #b91c1c; margin-left: 0.2rem; }
  .form-field .type-tag { display: inline-block; font-size: 0.7rem;
                          background: #e5e7eb; color: #374151; padding: 0.05rem 0.4rem;
                          border-radius: 4px; margin-left: 0.4rem; vertical-align: middle;
                          font-family: ui-monospace, monospace; }
  .toggle-row { display: flex; gap: 0.4rem; align-items: center;
                font-size: 0.8rem; margin: 0.6rem 0 0.3rem 0; color: #4b5563; }
  .toggle-row a { color: #2563eb; cursor: pointer; text-decoration: underline; }
  .schema-info { font-size: 0.75rem; color: #6b7280; margin-top: 0.3rem;
                  font-family: ui-monospace, monospace; }
  details summary { cursor: pointer; font-size: 0.75rem; color: #6b7280;
                    padding: 0.3rem 0; }
  details pre { max-height: 160px; }
  .schema-warn { font-size: 0.75rem; color: #b45309; margin: 0.4rem 0; }
  .object-fields { border-left: 2px solid #e5e7eb; padding-left: 0.7rem; margin-top: 0.4rem; }
  .array-row { display: flex; gap: 0.4rem; align-items: flex-start; margin: 0.3rem 0; }
  .array-row > input, .array-row > textarea, .array-row > select { flex: 1; }
  .array-row button { margin-top: 0; padding: 0.3rem 0.6rem; }
</style>
</head>
<body>
  <h1>human_node — dashboard</h1>
  <div class="row">
    <section class="card">
      <h2 style="margin-top:0">Send invocation</h2>
      <label>Target surface</label>
      <select id="target"></select>

      <div id="form-area"><!-- auto-generated form goes here --></div>

      <div class="toggle-row">
        <span id="form-mode-label">form mode</span>
        <a id="toggle-mode">switch to JSON</a>
      </div>

      <div id="json-area" style="display:none">
        <label>Payload (JSON)</label>
        <textarea id="payload">{}</textarea>
      </div>

      <label style="margin-top:0.5rem;display:flex;align-items:center;gap:0.4rem;font-size:0.85rem">
        <input type="checkbox" id="wait" checked style="width:auto" /> wait for response
      </label>
      <button id="send">Send</button>
      <div id="result"></div>

      <details style="margin-top:0.8rem">
        <summary>view schema</summary>
        <pre id="schema-view">no schema loaded</pre>
      </details>
    </section>
    <section class="card">
      <h2 style="margin-top:0">Inbox</h2>
      <div id="inbox"><div class="empty">no messages yet</div></div>
    </section>
  </div>
<script>
  const tgt = document.getElementById("target");
  const inbox = document.getElementById("inbox");
  const result = document.getElementById("result");
  const formArea = document.getElementById("form-area");
  const jsonArea = document.getElementById("json-area");
  const payloadJsonInput = document.getElementById("payload");
  const toggleLink = document.getElementById("toggle-mode");
  const formModeLabel = document.getElementById("form-mode-label");
  const schemaView = document.getElementById("schema-view");

  let useFormMode = true;
  let schemaCache = {};   // {target: {schema, type, invocation_mode}}
  let currentSchema = null;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  function render(state) {
    const prevTarget = tgt.value;
    tgt.innerHTML = "";
    for (const t of state.allowed_targets || []) {
      const o = document.createElement("option");
      o.value = t; o.textContent = t;
      tgt.appendChild(o);
    }
    if (prevTarget && (state.allowed_targets || []).includes(prevTarget)) {
      tgt.value = prevTarget;
    }
    if (!state.messages || !state.messages.length) {
      inbox.innerHTML = '<div class="empty">no messages yet</div>';
    } else {
      inbox.innerHTML = "";
      for (const m of state.messages) {
        const d = document.createElement("div");
        d.className = "msg";
        d.innerHTML = `<span class="from">${escapeHtml(m.from)}</span><span class="ts">${escapeHtml(m.timestamp)}</span>
                       <pre>${escapeHtml(JSON.stringify(m.payload, null, 2))}</pre>`;
        inbox.appendChild(d);
      }
    }
    if (tgt.value) renderForm(tgt.value);
  }

  async function loadSchemas() {
    try {
      const r = await fetch("/schemas");
      const data = await r.json();
      schemaCache = data.schemas || {};
      if (data.error) {
        console.warn("schemas fetch warning:", data.error, data.details || "");
      }
    } catch (e) {
      console.warn("schemas fetch failed:", e);
      schemaCache = {};
    }
    if (tgt.value) renderForm(tgt.value);
  }

  // Build a UI control for a single property based on its JSON schema
  function buildField(propName, propSchema, required, getValue, setValue) {
    const wrap = document.createElement("div");
    wrap.className = "form-field";
    const lab = document.createElement("label");
    const typeLabel = propSchema.type
      ? Array.isArray(propSchema.type) ? propSchema.type.join("|") : propSchema.type
      : (propSchema.enum ? "enum" : "any");
    lab.innerHTML = `${escapeHtml(propName)}<span class="type-tag">${escapeHtml(typeLabel)}</span>` +
                    (required ? '<span class="required">*</span>' : '');
    wrap.appendChild(lab);

    let input;
    const type = Array.isArray(propSchema.type) ? propSchema.type[0] : propSchema.type;

    if (propSchema.enum) {
      input = document.createElement("select");
      for (const opt of propSchema.enum) {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = String(opt);
        input.appendChild(o);
      }
      input.addEventListener("change", () => setValue(input.value));
      wrap.appendChild(input);
    } else if (type === "boolean") {
      input = document.createElement("input");
      input.type = "checkbox";
      input.style.width = "auto";
      input.addEventListener("change", () => setValue(input.checked));
      wrap.appendChild(input);
    } else if (type === "integer" || type === "number") {
      input = document.createElement("input");
      input.type = "number";
      if (type === "integer") input.step = "1";
      if (propSchema.minimum !== undefined) input.min = propSchema.minimum;
      if (propSchema.maximum !== undefined) input.max = propSchema.maximum;
      input.addEventListener("input", () => {
        const v = input.value === "" ? undefined : Number(input.value);
        setValue(v);
      });
      wrap.appendChild(input);
    } else if (type === "array") {
      // Render as a list of inputs with add/remove buttons
      input = document.createElement("div");
      const items = [];
      const itemSchema = propSchema.items || { type: "string" };
      const list = document.createElement("div");
      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "ghost";
      addBtn.textContent = "+ add item";
      addBtn.style.marginTop = "0.3rem";

      function commit() {
        setValue(items.slice());
      }
      function makeRow(initial) {
        const row = document.createElement("div");
        row.className = "array-row";
        let itemInput;
        const itype = Array.isArray(itemSchema.type) ? itemSchema.type[0] : itemSchema.type;
        if (itemSchema.enum) {
          itemInput = document.createElement("select");
          for (const opt of itemSchema.enum) {
            const o = document.createElement("option");
            o.value = opt; o.textContent = String(opt);
            itemInput.appendChild(o);
          }
        } else if (itype === "integer" || itype === "number") {
          itemInput = document.createElement("input");
          itemInput.type = "number";
        } else {
          itemInput = document.createElement("input");
          itemInput.type = "text";
        }
        if (initial !== undefined) {
          itemInput.value = initial;
          items.push(initial);
        } else {
          items.push(itype === "number" || itype === "integer" ? 0 : "");
        }
        const idx = items.length - 1;
        itemInput.addEventListener("input", () => {
          let v = itemInput.value;
          if (itype === "integer" || itype === "number") v = v === "" ? undefined : Number(v);
          items[idx] = v;
          commit();
        });
        const rm = document.createElement("button");
        rm.type = "button"; rm.className = "ghost"; rm.textContent = "−";
        rm.addEventListener("click", () => {
          items.splice(idx, 1);
          row.remove();
          // re-flow: simplest is to rebuild
          rebuildList();
        });
        row.appendChild(itemInput); row.appendChild(rm);
        list.appendChild(row);
        commit();
      }
      function rebuildList() {
        const snap = items.slice();
        items.length = 0;
        list.innerHTML = "";
        for (const v of snap) makeRow(v);
        commit();
      }
      addBtn.addEventListener("click", () => makeRow());
      input.appendChild(list);
      input.appendChild(addBtn);
      wrap.appendChild(input);
    } else if (type === "object" || (!type && propSchema.properties)) {
      // Nested object — recurse
      input = document.createElement("div");
      input.className = "object-fields";
      const obj = {};
      const props = propSchema.properties || {};
      const requiredList = propSchema.required || [];
      for (const [k, v] of Object.entries(props)) {
        const f = buildField(k, v, requiredList.includes(k),
          () => obj[k],
          (val) => { if (val === undefined || val === "") delete obj[k]; else obj[k] = val; setValue(JSON.parse(JSON.stringify(obj))); });
        input.appendChild(f);
      }
      // additionalProperties: free-form JSON
      if (propSchema.additionalProperties !== false && Object.keys(props).length === 0) {
        const ta = document.createElement("textarea");
        ta.placeholder = "free-form JSON object";
        ta.value = "{}";
        ta.addEventListener("input", () => {
          try { setValue(JSON.parse(ta.value)); } catch (_) {}
        });
        input.appendChild(ta);
      }
      wrap.appendChild(input);
    } else {
      // Default: string textarea (multi-line for description-like fields)
      const long = (propName.toLowerCase().includes("description") ||
                    propName.toLowerCase().includes("text") ||
                    propName.toLowerCase().includes("body") ||
                    propName.toLowerCase().includes("content"));
      input = document.createElement(long ? "textarea" : "input");
      if (!long) input.type = "text";
      if (propSchema.pattern) input.placeholder = `pattern: ${propSchema.pattern}`;
      if (propSchema.format === "color" || propName.toLowerCase().includes("color") || propName.toLowerCase().includes("colour")) {
        input.type = "color";
        input.style.width = "120px";
      }
      input.addEventListener("input", () => {
        let v = input.value;
        if (input.type === "color") setValue(v);
        else if (v === "") setValue(undefined);
        else setValue(v);
      });
      wrap.appendChild(input);
    }
    if (propSchema.description) {
      const desc = document.createElement("div");
      desc.className = "desc";
      desc.textContent = propSchema.description;
      wrap.appendChild(desc);
    }
    return wrap;
  }

  function buildFormFromSchema(schema, payloadHolder) {
    formArea.innerHTML = "";
    if (!schema || typeof schema !== "object") {
      const warn = document.createElement("div");
      warn.className = "schema-warn";
      warn.textContent = "no schema available — use JSON mode";
      formArea.appendChild(warn);
      return false;
    }
    const props = schema.properties || {};
    const required = schema.required || [];
    if (Object.keys(props).length === 0) {
      // Empty/unconstrained schema — show a single JSON textarea-style hint
      const note = document.createElement("div");
      note.className = "schema-warn";
      note.textContent = "schema accepts any payload — use JSON mode for full control";
      formArea.appendChild(note);
      return false;
    }
    // Build a "live" payload object that fields write into
    for (const [k, v] of Object.entries(props)) {
      const field = buildField(k, v, required.includes(k),
        () => payloadHolder.value[k],
        (val) => {
          if (val === undefined || val === null) delete payloadHolder.value[k];
          else payloadHolder.value[k] = val;
        });
      formArea.appendChild(field);
    }
    return true;
  }

  // Holder so closures share one mutable payload object
  const payloadHolder = { value: {} };

  function renderForm(target) {
    const entry = schemaCache[target];
    currentSchema = entry ? entry.schema : null;
    schemaView.textContent = currentSchema
      ? JSON.stringify(currentSchema, null, 2)
      : "no schema available for this target";
    payloadHolder.value = {};
    if (useFormMode) {
      const ok = buildFormFromSchema(currentSchema, payloadHolder);
      if (!ok) {
        // Fall back to JSON mode for this target
        switchToJsonMode(true);
      }
    }
  }

  function switchToJsonMode(silent) {
    useFormMode = false;
    formArea.style.display = "none";
    jsonArea.style.display = "";
    formModeLabel.textContent = "JSON mode";
    toggleLink.textContent = "switch to form";
    if (!silent) {
      // Pre-fill JSON with current form payload
      try { payloadJsonInput.value = JSON.stringify(payloadHolder.value, null, 2); } catch (_) {}
    } else if (!payloadJsonInput.value || payloadJsonInput.value === "{}") {
      payloadJsonInput.value = "{}";
    }
  }

  function switchToFormMode() {
    useFormMode = true;
    formArea.style.display = "";
    jsonArea.style.display = "none";
    formModeLabel.textContent = "form mode";
    toggleLink.textContent = "switch to JSON";
    // Try to migrate JSON → form payload if valid
    try {
      const parsed = JSON.parse(payloadJsonInput.value || "{}");
      payloadHolder.value = parsed && typeof parsed === "object" ? parsed : {};
    } catch (_) {
      payloadHolder.value = {};
    }
    renderForm(tgt.value);
  }

  toggleLink.addEventListener("click", () => {
    if (useFormMode) switchToJsonMode(false);
    else switchToFormMode();
  });

  tgt.addEventListener("change", () => {
    if (useFormMode) renderForm(tgt.value);
  });

  fetch("/state").then(r => r.json()).then(render).then(loadSchemas);
  const es = new EventSource("/events");
  es.addEventListener("state", (e) => {
    try { render(JSON.parse(e.data)); } catch (_) {}
  });

  document.getElementById("send").addEventListener("click", async () => {
    const target = tgt.value;
    let payload;
    if (useFormMode) {
      payload = JSON.parse(JSON.stringify(payloadHolder.value));
    } else {
      try { payload = JSON.parse(payloadJsonInput.value || "{}"); }
      catch (e) { result.innerHTML = '<span style="color:#b91c1c">payload is not valid JSON</span>'; return; }
    }
    const wait = document.getElementById("wait").checked;
    result.innerHTML = "<i>sending…</i>";
    const r = await fetch("/send", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({target, payload, wait})
    });
    const data = await r.json();
    result.innerHTML = `<b>HTTP ${r.status}</b><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
  });
</script>
</body>
</html>
