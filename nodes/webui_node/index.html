<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RAVEN Mesh — webui_node</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; padding: 0; min-height: 100vh; transition: background 0.4s ease; }
  .panel { display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100vh; gap: 1.5rem; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  h1 { font-size: 2.2rem; margin: 0; }
  .msg { font-size: 1.6rem; padding: 0.8rem 1.4rem; border-radius: 8px;
         background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); max-width: 90vw;
         text-align: center; min-height: 2rem; }
  .meta { font-size: 0.85rem; opacity: 0.65; }
  .meta code { background: rgba(0,0,0,0.3); padding: 0.1rem 0.4rem; border-radius: 4px; }
</style>
</head>
<body style="background:#222">
  <main class="panel">
    <h1>webui_node</h1>
    <div id="msg" class="msg">(no messages yet)</div>
    <div class="meta">
      surfaces: <code>webui_node.show_message</code> · <code>webui_node.change_color</code>
    </div>
  </main>
<script>
  const msgEl = document.getElementById("msg");
  function applyState(state) {
    if (state.color) document.body.style.background = state.color;
    if (state.message) msgEl.textContent = state.message;
  }
  fetch("/state").then(r => r.json()).then(applyState).catch(()=>{});
  const es = new EventSource("/events");
  es.addEventListener("state", (e) => {
    try { applyState(JSON.parse(e.data)); } catch (_) {}
  });
  es.onerror = () => { /* browser will auto-reconnect */ };
</script>
</body>
</html>
