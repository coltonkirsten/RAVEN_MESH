<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RAVEN Mesh — approval_node</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; padding: 1.5rem 2rem; background: #f4f5f7; color: #1f2933; }
  h1 { font-size: 1.4rem; margin: 0 0 1rem 0; }
  .empty { color: #6b7280; font-style: italic; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
          padding: 1rem 1.2rem; margin: 0 0 1rem 0; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .meta { font-size: 0.8rem; color: #6b7280; margin-bottom: 0.4rem; }
  .meta code { background: #f3f4f6; padding: 0.05rem 0.35rem; border-radius: 4px; }
  .target { font-weight: 600; margin-bottom: 0.5rem; }
  pre.payload { background: #0f172a; color: #cbd5e1; padding: 0.7rem;
                border-radius: 6px; max-height: 220px; overflow: auto;
                font-size: 0.85rem; }
  .actions { margin-top: 0.8rem; display: flex; gap: 0.5rem; }
  button { font: inherit; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
           border: 1px solid transparent; }
  .approve { background: #10b981; color: #fff; }
  .approve:hover { background: #059669; }
  .deny { background: #ef4444; color: #fff; }
  .deny:hover { background: #dc2626; }
</style>
</head>
<body>
  <h1>approval_node — pending approvals</h1>
  <div id="list"><div class="empty">connecting…</div></div>
<script>
  const list = document.getElementById("list");
  function render(pending) {
    if (!pending.length) {
      list.innerHTML = '<div class="empty">no pending approvals</div>';
      return;
    }
    list.innerHTML = "";
    for (const p of pending) {
      const card = document.createElement("div");
      card.className = "card";
      const target = p.env.payload && p.env.payload.target_surface || "(unknown target)";
      const inner  = p.env.payload && p.env.payload.payload || {};
      card.innerHTML = `
        <div class="meta">from <code>${p.env.from}</code> · msg <code>${p.env.id}</code> · ${p.created_at}</div>
        <div class="target">→ ${target}</div>
        <pre class="payload">${escapeHtml(JSON.stringify(inner, null, 2))}</pre>
        <div class="actions">
          <button class="approve" data-id="${p.env.id}" data-action="approve">Approve</button>
          <button class="deny"    data-id="${p.env.id}" data-action="deny">Deny</button>
        </div>`;
      list.appendChild(card);
    }
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }
  list.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-id]");
    if (!btn) return;
    btn.disabled = true;
    await fetch("/decide", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({msg_id: btn.dataset.id, action: btn.dataset.action})
    });
  });
  fetch("/state").then(r => r.json()).then(s => render(s.pending));
  const es = new EventSource("/events");
  es.addEventListener("state", (e) => {
    try { render(JSON.parse(e.data).pending); } catch (_) {}
  });
</script>
</body>
</html>
