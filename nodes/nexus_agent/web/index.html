<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus Agent — Inspector</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14181d;
      --panel-2: #1b2026;
      --line: #232a32;
      --fg: #d8dee4;
      --dim: #7a848f;
      --accent: #6dd0ff;
      --warn: #ffb86b;
      --err: #ff6b7d;
      --ok: #8bd17c;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
    }
    header {
      display: flex; align-items: baseline; gap: 16px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header h1 { font-size: 14px; margin: 0; letter-spacing: 0.04em; }
    header .meta { color: var(--dim); font-size: 12px; }
    header .meta span { margin-right: 12px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      grid-template-rows: 1fr 240px;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 49px);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .panel h2 {
      margin: 0; padding: 8px 12px;
      font-size: 12px; letter-spacing: 0.06em; color: var(--dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel .body { padding: 8px 12px; overflow-y: auto; flex: 1; min-height: 0; }
    .panel .body pre, .panel .body code {
      font-family: inherit; font-size: 12px;
      white-space: pre-wrap; word-wrap: break-word; margin: 0;
    }

    #chat .body { display: flex; flex-direction: column; gap: 6px; }
    .msg { padding: 6px 8px; border-radius: 3px; border-left: 3px solid var(--line); }
    .msg .role { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
    .msg.user { border-color: var(--accent); background: #0e1820; }
    .msg.assistant { border-color: var(--ok); background: #0f1a10; }
    .msg.tool_call { border-color: var(--warn); background: #1b1610; }
    .msg.tool_result { border-color: var(--warn); background: #14110a; }
    .msg.system { border-color: var(--dim); background: #11151a; color: var(--dim); }
    .msg.error { border-color: var(--err); background: #1a1012; color: var(--err); }
    .msg .tag { color: var(--dim); margin-right: 6px; }

    details { margin-top: 4px; }
    details summary { cursor: pointer; color: var(--dim); }

    .right-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 8px; min-height: 0; }
    .ledger pre { white-space: pre-wrap; }
    .session table { width: 100%; border-collapse: collapse; }
    .session td { padding: 3px 0; font-size: 12px; }
    .session td:first-child { color: var(--dim); width: 40%; }
    .tools .tool { padding: 4px 0; border-bottom: 1px dashed var(--line); }
    .tools .tool:last-child { border: none; }
    .tools .tool .name { color: var(--accent); }
    .tools .tool .desc { color: var(--dim); font-size: 11px; }

    button {
      background: var(--panel-2); color: var(--fg);
      border: 1px solid var(--line); border-radius: 3px;
      padding: 2px 8px; cursor: pointer; font: inherit; font-size: 11px;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .skill-list { list-style: none; padding: 0; margin: 0; }
    .skill-list li { padding: 2px 0; }
    .skill-list a { color: var(--accent); cursor: pointer; text-decoration: none; }
    .skill-list a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>NEXUS AGENT — INSPECTOR</h1>
  <div class="meta">
    <span>node: <strong id="m-node">…</strong></span>
    <span>model: <strong id="m-model">…</strong></span>
    <span>session: <strong id="m-session">—</strong></span>
    <span>runs: <strong id="m-runs">0</strong></span>
    <span class="dim" id="m-stream">●</span>
  </div>
</header>

<div class="grid">

  <section class="panel" id="chat">
    <h2>Chat / Stream
      <span><button onclick="clearChat()">clear</button></span>
    </h2>
    <div class="body" id="chat-body"></div>
  </section>

  <aside class="right-stack">
    <section class="panel ledger">
      <h2>Ledger — identity
        <span><button onclick="loadIdentity()">reload</button></span>
      </h2>
      <div class="body"><pre id="identity">loading…</pre></div>
    </section>

    <section class="panel ledger">
      <h2>Ledger — memory
        <span><button onclick="loadMemory()">reload</button></span>
      </h2>
      <div class="body"><pre id="memory">loading…</pre></div>
    </section>
  </aside>

  <section class="panel session">
    <h2>Session info</h2>
    <div class="body">
      <table>
        <tr><td>node id</td><td id="s-node">—</td></tr>
        <tr><td>model</td><td id="s-model">—</td></tr>
        <tr><td>session id</td><td id="s-sid">—</td></tr>
        <tr><td>runs handled</td><td id="s-runs">0</td></tr>
        <tr><td>last result</td><td id="s-last">—</td></tr>
        <tr><td>last tokens (in/out)</td><td id="s-tokens">—</td></tr>
        <tr><td>ui visible</td><td id="s-vis">—</td></tr>
      </table>
      <h3 style="margin-top: 12px; color: var(--dim); font-size: 12px;">Skills</h3>
      <ul class="skill-list" id="skills"></ul>
    </div>
  </section>

  <section class="panel tools">
    <h2>MCP tools
      <span><button onclick="loadTools()">reload</button></span>
    </h2>
    <div class="body" id="tools">loading…</div>
  </section>

</div>

<script>
const $ = (id) => document.getElementById(id);

function ts(d) {
  return new Date(d || Date.now()).toLocaleTimeString();
}

function appendMsg(klass, header, body, foldable) {
  const el = document.createElement("div");
  el.className = `msg ${klass}`;
  el.innerHTML = `<div class="role"><span class="tag">${ts()}</span>${header}</div>`;
  if (body) {
    if (foldable) {
      const det = document.createElement("details");
      det.innerHTML = `<summary>show</summary><pre></pre>`;
      det.querySelector("pre").textContent = typeof body === "string" ? body : JSON.stringify(body, null, 2);
      el.appendChild(det);
    } else {
      const pre = document.createElement("pre");
      pre.textContent = typeof body === "string" ? body : JSON.stringify(body, null, 2);
      el.appendChild(pre);
    }
  }
  const cb = $("chat-body");
  cb.appendChild(el);
  cb.scrollTop = cb.scrollHeight;
}

function clearChat() { $("chat-body").innerHTML = ""; }

async function loadStatus() {
  try {
    const r = await fetch("/status");
    const j = await r.json();
    $("m-node").textContent = j.node_id;
    $("m-model").textContent = j.model;
    $("m-session").textContent = j.session_id ? j.session_id.slice(0, 8) : "—";
    $("m-runs").textContent = j.run_count;
    $("s-node").textContent = j.node_id;
    $("s-model").textContent = j.model;
    $("s-sid").textContent = j.session_id || "—";
    $("s-runs").textContent = j.run_count;
    $("s-vis").textContent = j.ui_visible ? "yes" : "no";
    if (j.last_result) {
      $("s-last").textContent = (j.last_result.text || "").slice(0, 120);
      $("s-tokens").textContent = `${j.last_result.input_tokens || 0} / ${j.last_result.output_tokens || 0}`;
    }
  } catch (e) {}
}

async function loadIdentity() {
  const r = await fetch("/identity");
  const j = await r.json();
  $("identity").textContent = j.content || "(empty)";
}
async function loadMemory() {
  const r = await fetch("/memory");
  const j = await r.json();
  $("memory").textContent = j.content || "(empty)";
}
async function loadSkills() {
  const r = await fetch("/skills");
  const j = await r.json();
  const ul = $("skills");
  ul.innerHTML = "";
  for (const name of (j.skills || [])) {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.textContent = name;
    a.onclick = async () => {
      const r2 = await fetch(`/skills/${name}`);
      const jj = await r2.json();
      appendMsg("system", `skill: ${name}`, jj.content, true);
    };
    li.appendChild(a);
    ul.appendChild(li);
  }
}
async function loadTools() {
  const r = await fetch("/tools");
  const j = await r.json();
  const wrap = $("tools");
  wrap.innerHTML = "";
  for (const t of (j.tools || [])) {
    const div = document.createElement("div");
    div.className = "tool";
    div.innerHTML = `<div class="name">${t.name}</div><div class="desc"></div>`;
    div.querySelector(".desc").textContent = t.description || "";
    const det = document.createElement("details");
    det.innerHTML = `<summary>schema</summary><pre></pre>`;
    det.querySelector("pre").textContent = JSON.stringify(t.input_schema, null, 2);
    div.appendChild(det);
    wrap.appendChild(div);
  }
}

function handleEvent(kind, data) {
  // data is the inner {kind, data, at} envelope
  const inner = data.data;
  if (kind === "user_message") {
    appendMsg("user", `user (from ${inner.from || "?"})`, inner.text);
  } else if (kind === "agent_message") {
    // Claude stream-json subtypes
    const t = inner.type;
    if (t === "system") {
      appendMsg("system", `system: ${inner.subtype || ""}`, inner, true);
    } else if (t === "assistant") {
      const text = (inner.message?.content || [])
        .filter(c => c.type === "text").map(c => c.text).join("\n");
      const toolUses = (inner.message?.content || []).filter(c => c.type === "tool_use");
      if (text) appendMsg("assistant", "assistant", text);
      for (const u of toolUses) {
        appendMsg("tool_call", `tool_use → ${u.name}`, u.input, true);
      }
    } else if (t === "user") {
      // tool results echoed back as a user-role turn
      const trs = (inner.message?.content || []).filter(c => c.type === "tool_result");
      for (const tr of trs) {
        const body = Array.isArray(tr.content)
          ? tr.content.map(c => c.text || JSON.stringify(c)).join("\n")
          : tr.content;
        appendMsg("tool_result", `tool_result`, body, true);
      }
    } else if (t === "result") {
      const sum = `result · ${inner.duration_ms || 0}ms · in=${inner.usage?.input_tokens || 0} out=${inner.usage?.output_tokens || 0}`;
      appendMsg("system", sum, inner.result || "", true);
      loadStatus();
      loadMemory();
    }
  } else if (kind === "tool_call") {
    appendMsg("tool_call", `mesh tool → ${inner.tool} → ${inner.target}`, inner.payload, true);
  } else if (kind === "tool_result") {
    appendMsg("tool_result", `mesh tool result ← ${inner.target}`, inner.result, true);
  } else if (kind === "cli_stderr") {
    appendMsg("error", `cli stderr`, inner.line);
  } else if (kind === "cli_spawn") {
    appendMsg("system", `cli spawn`, inner, true);
  } else if (kind === "cli_exit") {
    appendMsg("system", `cli exit code=${inner.code}`, null);
  } else if (kind === "run_done") {
    loadStatus();
  } else if (kind === "run_error") {
    appendMsg("error", "run error", inner.error);
  } else if (kind === "memory_write") {
    appendMsg("system", "memory updated", inner);
    loadMemory();
  } else if (kind === "ui_visibility") {
    appendMsg("system", "ui visibility", inner);
  } else {
    appendMsg("system", kind, inner, true);
  }
}

function connectSSE() {
  const es = new EventSource("/events");
  $("m-stream").style.color = "var(--dim)";
  es.onopen = () => { $("m-stream").style.color = "var(--ok)"; };
  es.onerror = () => { $("m-stream").style.color = "var(--err)"; };
  // Listen to every event kind we know about
  const kinds = [
    "user_message", "agent_message", "tool_call", "tool_result",
    "cli_spawn", "cli_exit", "cli_stderr", "cli_output",
    "run_done", "run_error", "memory_write", "ui_visibility",
  ];
  for (const k of kinds) {
    es.addEventListener(k, (e) => {
      try { handleEvent(k, JSON.parse(e.data)); } catch (err) {}
    });
  }
}

loadStatus();
loadIdentity();
loadMemory();
loadSkills();
loadTools();
connectSSE();
setInterval(loadStatus, 5000);
</script>

</body>
</html>
